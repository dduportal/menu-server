name: ci

on:
  push:
    branches:
      - 202*
    tags:
      - v*
  pull_request:


jobs:
  build:
    name: Build and Run Tests
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - uses: actions/setup-java@v2
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'maven'
      - name: Package and Run all the Tests
        run: mvn verify
      - name: Upload Packaged App
        uses: actions/upload-artifact@v2
        with:
          name: app-jar
          path: |
            target/*.jar

  release:
    name: Release on Heroku
    runs-on: ubuntu-20.04
    needs: build
    if: contains(github.ref, 'refs/tags/v')
    steps:
      - name: Login to Heroku Container Registry
        uses: docker/login-action@v1
        with:
          registry: registry.heroku.com
          username: _
          password: ${{ secrets.HEROKU_TOKEN }}
      - name: Download a Single Artifact
        uses: actions/download-artifact@v2
        with:
          name: app-jar
      - name : Building Image
        run: docker build -t registry.heroku.com/menu-server-production/webapp
      - name : Pushing Image
        run: docker push registry.heroku.com/menu-server-production/webapp
